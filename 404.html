<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f7ff;
      color: #0f172a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(620px, 92%);
      background: #fff;
      border: 1px solid #d7def0;
      border-radius: 12px;
      padding: 1.2rem;
    }
    h1 { margin-top: 0; }
    a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
      margin-right: 1rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>404 - Page Not Found</h1>
    <p>The page you requested does not exist. Use one of the links below:</p>
    <p>
      <a href="./index.html">Open Reviewer</a>
      <a href="./practice-website.html">Open Practice Website</a>
    </p>
  </main>
</body>
</html>
